name: Sugarfree
options:
  bundleIdPrefix: com.sugarfree
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Sugarfree:
    type: application
    platform: iOS
    sources:
      - path: Sugarfree
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Sugarfree/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.sugarfree.app
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Sugarfree
    entitlements:
      path: Sugarfree/Sugarfree.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.sugarfree.app
        com.apple.developer.icloud-services:
          - CloudKit
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        shell: /bin/sh
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint
          else
            echo "warning: SwiftLint not installed"
          fi

  SugarfreeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SugarfreeTests
    dependencies:
      - target: Sugarfree
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sugarfree.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Sugarfree.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Sugarfree"
        BUNDLE_LOADER: "$(TEST_HOST)"

  SugarfreeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SugarfreeUITests
    dependencies:
      - target: Sugarfree
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sugarfree.uitests
        TEST_TARGET_NAME: Sugarfree
